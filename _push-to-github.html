function log(msg, cls) {
  const el = document.getElementById('log');
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = msg + '\n';
  el.appendChild(span);
  window.scrollTo(0, document.body.scrollHeight);
}

async function gh(method, path, data) {
  const r = await fetch('https://api.github.com' + path, {
    method,
    headers: {
      'Authorization': 'token ' + TOKEN,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: data ? JSON.stringify(data) : undefined
  });
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(r.status + ' ' + txt.slice(0, 200));
  }
  return r.json();
}

async function runPush() {
  document.getElementById('pushBtn').disabled = true;
  try {
    log('→ Getting current repo state...', 'info');
    const ref = await gh('GET', `/repos/${REPO}/git/refs/heads/master`);
    const currentSha = ref.object.sha;
    log('  Current master: ' + currentSha.slice(0,8), 'info');

    const commitObj = await gh('GET', `/repos/${REPO}/git/commits/${currentSha}`);
    const baseTreeSha = commitObj.tree.sha;
    log('  Base tree: ' + baseTreeSha.slice(0,8), 'info');

    log('\n→ Creating ' + Object.keys(FILES).length + ' file blobs...', 'info');
    const treeItems = [];
    let i = 0;
    for (const [path, content] of Object.entries(FILES)) {
      i++;
      const blob = await gh('POST', `/repos/${REPO}/git/blobs`, {
        content, encoding: 'base64'
      });
      treeItems.push({ path, mode: '100644', type: 'blob', sha: blob.sha });
      if (i % 5 === 0 || i === Object.keys(FILES).length) {
        log('  [' + i + '/' + Object.keys(FILES).length + '] ' + path, 'ok');
      }
    }

    log('\n→ Creating tree...', 'info');
    const newTree = await gh('POST', `/repos/${REPO}/git/trees`, {
      base_tree: baseTreeSha,
      tree: treeItems
    });
    log('  Tree: ' + newTree.sha.slice(0,8), 'ok');

    log('\n→ Creating commit...', 'info');
    const newCommit = await gh('POST', `/repos/${REPO}/git/commits`, {
      message: 'Session 7: Recession-first identity + SEO + Bug Fixes\n\n- Rebuild index.html as recession intelligence platform (10 sections)\n- Update siteMeta, nav (7 primary items), secondaryNavItems in content.js\n- Update renderHeader/renderNav/renderFooter in ui.js (recession branding)\n- Fix factor.html: shows all-10-factor index when no ?f= param\n- Add about.html with methodology, model, data sources\n- Add robots.txt and sitemap.xml\n- Fix all page titles + canonical tags on all 19 HTML pages\n- Remove all AdSense from every page\n- Remove Leaflet from homepage\n- Make war day counter dynamic',
      tree: newTree.sha,
      parents: [currentSha]
    });
    log('  Commit: ' + newCommit.sha.slice(0,8), 'ok');

    log('\n→ Updating master branch...', 'info');
    await gh('PATCH', `/repos/${REPO}/git/refs/heads/master`, {
      sha: newCommit.sha, force: false
    });

    log('\n✓ PUSHED SUCCESSFULLY!', 'ok');
    log('  Commit: ' + newCommit.sha.slice(0,8), 'ok');
    log('  Vercel will deploy in ~30 seconds', 'ok');
    log('  → https://geowire.org', 'ok');
    document.getElementById('pushBtn').textContent = '✓ Done!';

  } catch(err) {
    log('\n✗ ERROR: ' + err.message, 'err');
    document.getElementById('pushBtn').disabled = false;
    document.getElementById('pushBtn').textContent = '🔄 Retry';
  }
}
</script>
